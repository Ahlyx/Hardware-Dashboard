<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Hardware Dashboard</h1>
        <p>LIVE SYSTEM MONITOR made by @Ahlyx</p>
    </header>

    <main>
        <section id="system">
            <h2>System Info</h2>
            <div id="system-data"></div>
        </section>

        <div class="grid">
            <section id="cpu">
                <h2>CPU</h2>
                <div id="cpu-data"></div>
            </section>

            <section id="ram">
                <h2>RAM</h2>
                <div id="ram-data"></div>
            </section>

            <section id="disk">
                <h2>Disk</h2>
                <div id="disk-data"></div>
            </section>

            <section id="network">
                <h2>Network</h2>
                <div id="network-data"></div>
            </section>
        </div>
    </main>

    <footer>
        <p>REFRESHING EVERY 2 SECONDS — BUILT WITH FASTAPI + PYTHON</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
